[platformio]
default_envs = esp32c3

[env:esp32c3]
platform  = espressif32
board     = lolin_c3_mini
framework = arduino

monitor_speed = 115200
upload_speed  = 115200

lib_deps =
    sensirion/Sensirion I2C SCD4x  @ ^0.4.0
    adafruit/Adafruit NeoPixel     @ ^1.12.0
    adafruit/Adafruit SSD1306      @ ^2.5.0
    adafruit/Adafruit GFX Library  @ ^1.11.0
