[platformio]
default_envs = esp32c3

; ─── ESP32-C3-WROOM-02 ────────────────────────────────────────────────────────
[env:esp32c3]
platform  = espressif32
board     = lolin_c3_mini   ; closest PlatformIO board def for WROOM-02
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

; load_env.py runs before the build and injects .env variables into sysenv.*
extra_scripts = pre:load_env.py

; ─── Libraries ────────────────────────────────────────────────────────────────
lib_deps =
    sensirion/Sensirion I2C SCD4x     @ ^0.4.0
    bblanchon/ArduinoJson             @ ^7.0.0
    knolleary/PubSubClient            @ ^2.8.0
    adafruit/Adafruit NeoPixel        @ ^1.12.0

; ─── Build flags ──────────────────────────────────────────────────────────────
; Credentials are injected from .env at build time via load_env.py + sysenv.*
; No secrets live in source control.
build_flags =
    '-D WIFI_SSID="${sysenv.WIFI_SSID}"'
    '-D WIFI_PASSWORD="${sysenv.WIFI_PASSWORD}"'
    '-D MQTT_BROKER_HOST="${sysenv.MQTT_BROKER_HOST}"'
    -D MQTT_BROKER_PORT=${sysenv.MQTT_BROKER_PORT}
    '-D MQTT_PUBLISH_USERNAME="${sysenv.MQTT_PUBLISH_USERNAME}"'
    '-D MQTT_PUBLISH_PASSWORD="${sysenv.MQTT_PUBLISH_PASSWORD}"'
    '-D MQTT_TOPIC="${sysenv.MQTT_TOPIC}"'
