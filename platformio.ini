[platformio]
default_envs = esp32c3, esp32c3_showcase
; esp32c3_stcc4 and esp32c3_test_display are opt-in — flash explicitly with flash.sh

; ─── Shared non-sensor libs (referenced by all sensor envs) ───────────────────
[shared_libs]
base =
    adafruit/Adafruit NeoPixel     @ ^1.12.0
    adafruit/Adafruit SSD1306      @ ^2.5.0
    adafruit/Adafruit GFX Library  @ ^1.11.0
    knolleary/PubSubClient         @ ^2.8
    bblanchon/ArduinoJson          @ ^7.0

[env:esp32c3]
platform  = espressif32
board     = lolin_c3_mini
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

; ─── Secrets (injected from .env via sysenv) ──────────────────────────────────
build_flags =
    -D WIFI_SSID=\"${sysenv.WIFI_SSID}\"
    -D WIFI_PASSWORD=\"${sysenv.WIFI_PASSWORD}\"
    -D MQTT_BROKER_HOST=\"${sysenv.MQTT_BROKER_HOST}\"
    -D MQTT_PUBLISH_USERNAME=\"${sysenv.MQTT_USER_PUB}\"
    -D MQTT_PUBLISH_PASSWORD=\"${sysenv.MQTT_PASS_PUB}\"

lib_deps =
    sensirion/Sensirion I2C SCD4x  @ ^0.4.0
    ${shared_libs.base}

[env:esp32c3_stcc4]
extends = env:esp32c3
build_flags =
    ${env:esp32c3.build_flags}
    -D SENSOR_STCC4
lib_deps =
    sensirion/Sensirion I2C STCC4  @ ^1.0.0
    sensirion/Sensirion Core       @ ^0.7.0
    ${shared_libs.base}

[env:esp32c3_showcase]
extends = env:esp32c3
build_flags =
    ${env:esp32c3.build_flags}
    -D SHOWCASE_MODE

[env:esp32c3_test_display]
platform  = espressif32
board     = lolin_c3_mini
framework = arduino
monitor_speed    = 115200
upload_speed     = 921600
build_src_filter = -<*> +<../test/test_display/>
lib_deps =
    adafruit/Adafruit SSD1306      @ ^2.5.0
    adafruit/Adafruit GFX Library  @ ^1.11.0
